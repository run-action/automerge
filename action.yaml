name: Dependabot auto-merge
description: >-
  Squash-merge open Dependabot PRs once they are at least `cooldown-days` old
  and every check has passed. The cooldown gives a window for a yanked or
  malicious release to be caught before it lands on the default branch.

inputs:
  cooldown-days:
    description: "Days a Dependabot PR must age before it is eligible to merge."
    default: "3"
  github-token:
    description: "Token used to query and merge PRs. Defaults to the job token."
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Enable auto-merge for eligible Dependabot PRs
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        COOLDOWN_DAYS: ${{ inputs.cooldown-days }}
      run: |
        set -euo pipefail

        export COOLDOWN_CUTOFF=$(date -u -d "${COOLDOWN_DAYS} days ago" +%s)

        mapfile -t prs < <(
          gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --author "app/dependabot" \
            --state open \
            --json number,createdAt,commits,mergeable,statusCheckRollup \
            --jq '
              (env.COOLDOWN_CUTOFF | tonumber) as $cutoff
              | .[]
              | select(.mergeable == "MERGEABLE")
              | select((.createdAt | fromdateiso8601) <= $cutoff)
              | select((.commits[-1].committedDate | fromdateiso8601) <= $cutoff)
              | select((.statusCheckRollup | length) > 0)
              | select(all(.statusCheckRollup[];
                  (.conclusion // .state) as $s
                  | $s == "SUCCESS" or $s == "NEUTRAL" or $s == "SKIPPED"))
              | .number
            '
        )

        if [ "${#prs[@]}" -eq 0 ]; then
          echo "No eligible Dependabot PRs."
          exit 0
        fi

        for pr in "${prs[@]}"; do
          echo "::notice::Enabling auto-merge for PR #${pr}"
          if ! gh pr merge "$pr" --repo "$GITHUB_REPOSITORY" --auto --squash --delete-branch; then
            echo "::error::Could not enable auto-merge for PR #${pr}. Enable it under Settings -> General -> Pull Requests -> 'Allow auto-merge' in $GITHUB_REPOSITORY."
            exit 1
          fi
        done
