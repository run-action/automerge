name: Gated automerge
description: Squash-merge open Dependabot PRs after a cooldown window once all checks have passed.

branding:
  icon: git-merge
  color: green

inputs:
  cooldown-days:
    description: "Days a Dependabot PR must age before it is eligible to merge."
    default: "3"
  skip-labels:
    description: >-
      Comma-separated label names that exclude a PR from auto-merge. A PR
      carrying any of these is left untouched for human review. Defaults to
      "no-auto-merge"; set to "" to disable label-based exclusion.
    default: "no-auto-merge"
  require-checks:
    description: >-
      Whether a PR must have at least one check to be eligible. When "true"
      (the default) a PR with no checks is skipped, since nothing validated it.
      Set to "false" to merge such PRs anyway, relying solely on the cooldown.
    default: "true"
  auto-merge:
    description: >-
      When "true", enable GitHub auto-merge (gh pr merge --auto) instead of
      merging directly, so requirements that change between the eligibility
      check and the merge are still enforced by GitHub. Needs the repo's
      "Allow auto-merge" setting and a ruleset or branch protection with at
      least one requirement; without those, keep the default direct merge.
    default: "false"
  github-token:
    description: "Token used to query and merge PRs. Defaults to the job token."
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Squash-merge eligible Dependabot PRs
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        COOLDOWN_DAYS: ${{ inputs.cooldown-days }}
        SKIP_LABELS: ${{ inputs.skip-labels }}
        REQUIRE_CHECKS: ${{ inputs.require-checks }}
        AUTO_MERGE: ${{ inputs.auto-merge }}
      run: "$GITHUB_ACTION_PATH/scripts/automerge.sh"
